logging:
  level:
    root: INFO

decorator:
  datasource:
    p6spy:
      enable-logging: true
      multiline: true
      logging: slf4j
      tracing:
        include-parameter-values: true

testcontainers:
  postgres:
    image: postgres:18-alpine


spring:
  config:
    activate:
      on-profile: test # 내이름은 xxx이다.(파일 이름 명시)

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
    show-sql: true
    open-in-view: false